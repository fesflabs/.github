name: CD Centralizado (Deploy)

on:
  workflow_call:
    inputs:
      service_name:
        description: "Nome do serviço no docker-compose"
        required: true
        type: string
      project_type:
        description: "Tipo: 'backend' ou 'frontend'"
        required: true
        type: string
      working_directory:
        description: "Diretório do docker-compose"
        required: false
        default: "."
        type: string
      migration_command:
        description: "Comando opcional de migração a ser executado no container do serviço"
        required: false
        default: ""
        type: string
      runner_labels:
        description: "Labels do runner de deploy"
        required: true
        type: string
      environment_name:
        description: "Ambiente para carregar as variáveis (develop, homolog, prod)"
        required: true
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      PROD_DB_HOST:
        required: false
      PROD_DB_PORT:
        required: false
      PROD_DB_NAME:
        required: false
      PROD_DB_USER:
        required: false
      PROD_DB_PASSWORD:
        required: false
      PROD_LOG_LEVEL:
        required: false
      PROD_RELOAD:
        required: false
      JWT_SECRET:
        required: false
      MAIL_USERNAME:
        required: false
      MAIL_PASSWORD:
        required: false
      MAIL_FROM:
        required: false
      SECRET_CODE:
        required: false
      REDIS_HOST:
        required: false
      REDIS_PORT:
        required: false
      REDIS_DB:
        required: false
      REDIS_ENABLED:
        required: false

jobs:

  check-approvals:
    name: Verificar Aprovação
    runs-on: ubuntu-latest
    steps:
      - name: Verificar Reviews
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.pull_request) return;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const approved = reviews.some(r => r.state === "APPROVED");
            if (!approved) core.setFailed("❌ PR sem aprovação. Deploy bloqueado.");

  deploy:
    name: Deploy
    needs: check-approvals
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment_name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ORG_REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Gerar .env Dinâmico
        working-directory: ${{ inputs.working_directory }}
        run: |
          rm -f .env
          touch .env

          echo "--- Gerando configurações de ambiente ---"
          if [ "${{ inputs.project_type }}" == "backend" ]; then
            echo "API_ROOT_PATH=${{ vars.API_ROOT_PATH }}" >> .env
            echo "API_V1_STR=${{ vars.API_V1_STR }}" >> .env
            echo "AUTH_SERVICE_URL=${{ vars.AUTH_SERVICE_URL }}" >> .env
            echo "TIPO_AMBIENTE=${{ vars.TIPO_AMBIENTE }}" >> .env
            echo "TITLE=${{ vars.TITLE }}" >> .env
            
            echo "LOG_LEVEL=info" >> .env 

            echo "PROD_DB_HOST=${{ secrets.PROD_DB_HOST }}" >> .env
            echo "PROD_DB_PORT=${{ secrets.PROD_DB_PORT }}" >> .env
            echo "PROD_DB_NAME=${{ secrets.PROD_DB_NAME }}" >> .env
            echo "PROD_DB_USER=${{ secrets.PROD_DB_USER }}" >> .env
            echo "PROD_DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> .env
            echo "PROD_LOG_LEVEL=${{ secrets.PROD_LOG_LEVEL }}" >> .env
            echo "PROD_RELOAD=${{ secrets.PROD_RELOAD }}" >> .env
            
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            echo "MAIL_FROM=${{ secrets.MAIL_FROM }}" >> .env
            echo "SECRET_CODE=${{ secrets.SECRET_CODE }}" >> .env
            echo "REDIS_HOST=${{secrets.REDIS_HOST}}" >> .env
            echo "REDIS_PORT=${{secrets.REDIS_PORT}}" >> .env
            echo "REDIS_DB=${{secrets.REDIS_DB}}" >> .env
            echo "REDIS_ENABLED=${{secrets.REDIS_ENABLED}}" >> .env
          else
            echo "NEXT_PUBLIC_API_URL=${{ vars.AUTH_SERVICE_URL }}" >> .env
            echo "NEXT_PUBLIC_URL=${{ vars.NEXT_PUBLIC_URL }}" >> .env
            echo "NEXT_PUBLIC_BASE_PATH=${{ vars.API_ROOT_PATH }}" >> .env
            echo "NEXT_PUBLIC_FEATURE_FLAGS_ENABLED=${{ vars.FEATURE_FLAGS_ENABLED }}" >> .env
            echo "NEXT_PUBLIC_PORTAL_BASE_URL=${{ vars.PORTAL_BASE_URL }}" >> .env
            echo "NEXT_PUBLIC_TITLE=${{ vars.TITLE }}" >> .env
          fi

          sed 's/=.*/=[redacted]/' .env

      - name: Atualizar Serviço
        working-directory: ${{ inputs.working_directory }}
        env:
          NETWORK_NAME: ${{ vars.NETWORK_NAME }}
          IMAGE_TAG: ${{ vars.ORG_REGISTRY_URL }}/${{ vars.REPO_IMAGE_NAME }}:${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          echo "🚀 Baixando imagem: $IMAGE_TAG"
          docker compose pull ${{ inputs.service_name }}

          echo "🚀 Recriando container..."
          docker compose up -d

      - name: Executar Migrações
        if: ${{ inputs.project_type == 'backend' && inputs.migration_command != '' }}
        working-directory: ${{ inputs.working_directory }}
        env:
          NETWORK_NAME: ${{ vars.NETWORK_NAME }}
          MIGRATION_COMMAND: ${{ inputs.migration_command }}
        run: |
          echo "🚀 Executando migrações: $MIGRATION_COMMAND"
          for attempt in 1 2 3 4 5; do
            if docker compose exec -T ${{ inputs.service_name }} sh -lc "$MIGRATION_COMMAND"; then
              echo "✅ Migrações executadas com sucesso."
              exit 0
            fi
            echo "⏳ Tentativa $attempt falhou. Aguardando container estabilizar..."
            sleep 5
          done
          echo "❌ Não foi possível executar as migrações."
          exit 1

      - name: Limpeza
        if: always()
        run: docker image prune -f
